services:
  api:
    image: ghcr.io/japhethlg/churchflow-api:latest
    container_name: church-api
    restart: unless-stopped
    pull_policy: always
    ports:
      - "8002:8000"
    env_file:
      - .env.production
    networks:
      - postgres
      - default
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  postgres:
    external: true
    name: local-postgres_default
